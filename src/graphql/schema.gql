  "Child sub-spaces"
  children: [Space]
  "Voting guidelines text"
  guidelines: String
  "Proposal template"
  template: String
  "Whether the space is verified"
  verified: Boolean
  "Whether the space has been flagged"
  flagged: Boolean
  "Flag reason code"
  flagCode: Int
  "Whether the space is hibernated (inactive)"
  hibernated: Boolean
  "Whether turbo mode is enabled"
  turbo: Boolean
  "Unix timestamp when turbo mode expires"
  turboExpiration: Int
  "Ranking score"
  rank: Float
  "Boost settings"
  boost: BoostSettings
  "Unix timestamp of when the space was created"
  created: Int!
}

"Ranked list of spaces with aggregated metrics"
type RankingObject {
  "List of ranked spaces"
  items: [Space]
